name: PR Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies
        working-directory: app
        run: npm ci --legacy-peer-deps
      - name: Lint
        working-directory: app
        run: npm run lint
      - name: Type check
        working-directory: app
        run: npm run type-check

  preview-deploy:
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Prepare PR preview app spec
        env:
          PREVIEW_BRANCH: ${{ github.head_ref }}
        run: |
          cp .do/app.yaml .do/preview-app.yaml
          perl -0pi -e 's/branch: main/branch: $ENV{PREVIEW_BRANCH}/' .do/preview-app.yaml
      - name: Deploy PR Preview to DigitalOcean
        id: deploy
        uses: digitalocean/app_action/deploy@v2
        env:
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
        with:
          deploy_pr_preview: "true"
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          app_spec_location: .do/preview-app.yaml
      - name: Comment preview URL on PR
        if: steps.deploy.outputs.url
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const body = `🚀 **Preview deployed!**\n\n${url}\n\n_This preview will be automatically deleted when the PR is closed._`;

            // Check if we already commented
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.includes('Preview deployed!'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
